# Configuration used when a test boots the full Spring context (see ApplicationContextTest).
server.port=0

wgmgr.server=10.0.0.1
wgmgr.network=10.0.0.0/24
wgmgr.server-endpoint=vpn.example.com:51820
wgmgr.server-public-key=TestServerPublicKey123456789012345678901234=
wgmgr.users-file=target/test-classes/test-users.lst
wgmgr.peers-file=${java.io.tmpdir}/wg-keyman-ctxtest-peers.conf
# echo avoids invoking sudo/systemctl during the test
wgmgr.sync-command=echo ctxtest-sync

# Dummy OAuth2 registration so the security/oauth2 client config can start
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile
