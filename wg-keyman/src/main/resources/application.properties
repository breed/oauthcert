# Server configuration
server.port=8080

# WireGuard Manager configuration
# The VPN IP address of the WireGuard server (peer address for clients)
wgmgr.server=10.0.0.1

# The VPN network address (used for AllowedIPs)
wgmgr.network=10.0.0.0/24

# The public endpoint of the WireGuard server (host:port)
wgmgr.server-endpoint=vpn.example.com:51820

# The WireGuard server's public key
wgmgr.server-public-key=REPLACE_WITH_SERVER_PUBLIC_KEY

# Path to the users list file
wgmgr.users-file=users.lst

# Path to the WireGuard peers config file (updated when a user submits a public key)
wgmgr.peers-file=peers.conf

# WireGuard interface name (default: wg0)
wgmgr.interface=wg0

# Custom sync command (optional, default: sudo systemctl reload wg-quick@<interface>)
# Set to 'echo' or leave empty to disable syncing during development
# wgmgr.sync-command=sudo systemctl reload wg-quick@wg0

# OAuth2 configuration (example for Google - replace with your provider)
spring.security.oauth2.client.registration.google.client-id=YOUR_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
